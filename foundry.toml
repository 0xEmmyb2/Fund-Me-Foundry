[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
remappings = [
    "@chainlink/=node_modules/@chainlink/"
]
solc = "0.8.19"
fs_permissions = [{ access = "read", path = "./broadcast" }]

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"